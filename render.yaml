databases:
  - name: ast-postgres
    plan: free
    databaseName: ast_db
    user: ast_user
    region: oregon

services:
  - type: web
    name: ast-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: true
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ast-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEIGHBRIDGE_SECRET
        value: ast-weighbridge-secret-2026
      - key: MINIO_ENDPOINT
        value: ""
      - key: PORT
        value: "3000"
