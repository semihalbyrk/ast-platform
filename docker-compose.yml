services:
  postgres:
    image: postgres:16-alpine
    container_name: ast-postgres
    ports:
      - '127.0.0.1:10098:5432'
    environment:
      POSTGRES_DB: ast_db
      POSTGRES_USER: ast_user
      POSTGRES_PASSWORD: ast_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ast_user -d ast_db']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - evreka_ast-network

  minio:
    image: minio/minio:latest
    container_name: ast-minio
    ports:
      - '127.0.0.1:10097:9000'
      - '127.0.0.1:10096:9001'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ast_minio
      MINIO_ROOT_PASSWORD: ast_minio_secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - evreka_ast-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ast-api
    ports:
      - '127.0.0.1:10095:3000'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npm install && npm run migration:run && npm run seed && npm run start:dev"
    networks:
      - evreka_ast-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ast-web
    ports:
      - '127.0.0.1:10099:5173'
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - evreka_ast-network

networks:
  evreka_ast-network:
    driver: bridge

volumes:
  pgdata:
  minio_data:
